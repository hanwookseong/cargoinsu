<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="N2N Insurance Brokerage">
  <title>N2N Insurance Brokerage</title>
  <desc>Three-disc N2N mark with INSURANCE wordmark and Brokerage and Services tagline.</desc>

  <circle cx="80" cy="60" r="48" fill="#0B2818"/>
  <circle cx="160" cy="60" r="48" fill="#D97757"/>
  <circle cx="240" cy="60" r="48" fill="#0B2818"/>

  <text x="80" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-2"
        fill="#F4F0E8">N</text>
  <text x="160" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800"
        fill="#F4F0E8">2</text>
  <text x="240" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-2"
        fill="#F4F0E8">N</text>

  <text x="160" y="142" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="6"
        fill="#0B2818">INSURANCE</text>
  <text x="160" y="166" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" letter-spacing="2"
        fill="#0B2818">Brokerage &amp; Services</text>
</svg>
