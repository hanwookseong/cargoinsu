<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" role="img" aria-label="N2N Insurance Brokerage">
  <title>N2N Insurance Brokerage</title>
  <desc>Monochrome ivory variant of the three-disc N2N mark for use on dark forest-green backgrounds.</desc>

  <circle cx="60" cy="34" r="26" fill="none" stroke="#F4F0E8" stroke-width="1.8"/>
  <circle cx="120" cy="34" r="26" fill="none" stroke="#F4F0E8" stroke-width="1.8"/>
  <circle cx="180" cy="34" r="26" fill="none" stroke="#F4F0E8" stroke-width="1.8"/>

  <text x="60" y="46" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-1"
        fill="#F4F0E8">N</text>
  <text x="120" y="46" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700"
        fill="#F4F0E8">2</text>
  <text x="180" y="46" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-1"
        fill="#F4F0E8">N</text>

  <text x="120" y="92" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="700" letter-spacing="2"
        fill="#F4F0E8">INSURANCE</text>
  <text x="120" y="120" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="700" letter-spacing="2"
        fill="#F4F0E8">BROKERAGE</text>
</svg>
