<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="cargoinsu.com Open Graph image">
  <title>cargoinsu.com — 적하보험 온라인 플랫폼</title>

  <defs>
