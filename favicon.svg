<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="N2N 엔투엔보험중개">
  <!-- Forest green 원형 디스크 배경 -->
  <circle cx="50" cy="50" r="50" fill="#0B2818"/>
  
  <!-- 큰 N letter (path로 그려 폰트 의존성 제거, 모든 크기에서 동일하게 표시) -->
  <path d="M 28 72 L 28 28 L 72 72 L 72 28" 
        stroke="#F4F0E8" 
        stroke-width="11" 
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
